{% extends "base.html" %}
{% block title %}Nova set lista{% endblock %}

{% block content %}

<!-- WRAPPER -->
<div style="
    margin:auto;
    padding:20px;
">

<!-- ACTION BAR -->
<div class="action-bar"
     style="
        padding:16px;
        top:16px;
        border-bottom:1px solid #222;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
">

    <!-- LEFT: TITLE -->
    <div style="
        font-size:22px;
        font-weight:800;
        display:flex;
        align-items:center;
        gap:10px;
    ">
        <span class="icon icon-setliste"></span>
       Set lista
    </div>

</div>

<h3 style="
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    padding:16px;
    color:#777;
    font-size:16px;
">
    Izradi novu listu
</h3>

    <form method="post">

        <label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Naziv *
        </label>
        <input
            type="text"
            name="name"
            required
            placeholder="npr. Svadba, Klub, Gala "
            style="width:100%;height:48px;border-radius:12px;background:#111;border:1px solid #333;color:#fff;padding:0 14px;font-size:16px;margin-bottom:16px;"
        >

        <label style="display:block;margin-bottom:6px;color:#aaa;gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Datum
        </label>
        <div style="position:relative; display:flex; align-items:center; margin-bottom:16px;">
            <input
                type="date"
                name="date"
                style="
                    width:100%;
                    height:48px;
                    border-radius:12px;
                    background:#111;
                    border:1px solid #333;
                    color:#fff;
                    padding:0 44px 0 14px;
                    font-size:16px;
                    color-scheme: dark;
                    text-align:left;
                    box-sizing:border-box;
                    line-height:48px;
                    display:block;
                "
            >

            <span class="icon icon-calendar"
                  style="
                    position:absolute;
                    right:14px;
                    top:50%;
                    transform:translateY(-50%);
                    display:flex;
                    align-items:center;
                    justify-content:center;
                    pointer-events:none;
                    opacity:0.9;
                  ">
            </span>
        </div>

        <label style="display:block;margin-bottom:6px;color:#aaa;gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Napomena
        </label>
        <input
            type="text"
            name="note"
            placeholder="npr. nova set lista"
            style="width:100%;height:48px;border-radius:12px;background:#111;border:1px solid #333;color:#fff;padding:0 14px;font-size:16px;margin-bottom:20px;"
        >

        <div style="text-align:center;">
            <button type="submit"
    style="
        display:inline-flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        padding:12px 22px;
        background:#1f1f23;
        border:1px solid #2a2a30;
        color:#fff;
        border-radius:12px;
        font-weight:600;
        font-size:15px;
        cursor:pointer;
    ">
    <span style="display:inline-flex;align-items:center;gap:8px;">
        <span class="icon icon-save" style="width:16px;height:16px;background-color:currentColor;"></span>
        Spremi
    </span>
</button>
        </div>

    </form>

</div>

<style>
input[type="date"] {
    appearance: none;
    -webkit-appearance: none;
    width:100%;
    box-sizing:border-box;
    text-align:left;
}

input[type="date"]::-webkit-date-and-time-value {
    text-align:left;
}

input[type="date"]::-webkit-calendar-picker-indicator {
    opacity: 0;
    position: absolute;
    right: 0;
    width: 44px;
    height: 100%;
    cursor: pointer;
}

body {
    overflow-x: hidden;
}

* {
    box-sizing: border-box;
}
</style>

{% endblock %}
