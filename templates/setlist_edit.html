{% extends "base.html" %}
{% block title %}Uredi set listu{% endblock %}
{% block content %}

<!-- WRAPPER S GRADIENTOM -->
<div style="
    margin:auto;
    padding:20px;
    background:#161618;
    min-height:100vh;
">

<!-- ACTION BAR -->
<div class="action-bar"
     style="
        padding:16px;
        top:88px;
        border-bottom:1px solid #222;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
">

    <!-- LEFT: TITLE -->
    <div style="
        font-size:22px;
        font-weight:800;
        display:flex;
        align-items:center;
        gap:10px;
    ">
        <span class="icon icon-setliste"></span>
        {{ setlist.name }}
    </div>

</div>

<h3 style="
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    padding:16px;
    color:#777;
    font-size:16px;
">
    Promijeni podatke
</h3>

    <!-- FORMA -->
    <form method="post">

        <!-- NAZIV -->
        <label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Naziv *
        </label>
        <input type="text" name="name"
       value="{{ setlist.name }}"
       placeholder="Naziv"
       required
       style="
                width:100%;
                height:48px;
                border-radius:12px;
                background:#111;
                border:1px solid #2a2a30;
                color:#fff;
                padding:0 14px;
                font-size:16px;
                margin-bottom:16px;
            "
        >
<!-- DATUM -->
<label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
        Datum *
</label>
<div style="position:relative; margin-bottom:16px;">
    <input type="date" name="date"
           value="{{ setlist.date }}"
           required
           style="
                width:100%;
                height:48px;
                border-radius:12px;
                background:#111;
                border:1px solid #2a2a30;
                color:#fff;
                padding:0 40px 0 14px;
                font-size:16px;
                box-sizing:border-box;
                color-scheme: dark;
                line-height:48px;
           "
    >

    <span class="icon icon-calendar"
          style="
      position:absolute;
      right:14px;
      top:calc(50% - 14px);
      width:20px;
      height:20px;
      pointer-events:none;
      opacity:0.8;
">
    </span>
</div>
        
<!-- NAPOMENA -->
<label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Napomena
    </label>
    <textarea name="note"
              placeholder="Bilješka"
              style="
              min-height:100px;
              border-radius:12px;
              background:#111;
              border:1px solid #333;
              color:#fff;
              padding:16px;
          ">{{ setlist.note }}</textarea>

<div style="text-align:center;">
        
<!-- GUMB -->
<button type="submit"
    style="
        display:inline-flex;
        align-items:center;
        justify-content:center;
        gap:8px;
        padding:12px 22px;
        background:#1f1f23;
        border:1px solid #2a2a30;
        color:#fff;
        border-radius:12px;
        font-weight:600;
        font-size:15px;
        cursor:pointer;
    ">
    <span class="icon icon-save" style="width:16px;height:16px;background-color:currentColor;"></span>
    Spremi
</button>


</form>
</div>

<style>
input[type="date"]::-webkit-calendar-picker-indicator {
    opacity: 0;
    position: absolute;
    right: 0;
    width: 40px;
    height: 48px;
    cursor: pointer;
}
</style>

{% endblock %}
