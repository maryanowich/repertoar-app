{% extends "base.html" %}
{% block title %}Uredi set listu{% endblock %}
{% block content %}

<!-- WRAPPER S GRADIENTOM -->
<div style="
    margin:auto;
    padding:20px;
">

<!-- ACTION BAR -->
<div class="action-bar"
     style="
        padding:16px;
        top:88px;
        border-bottom:1px solid #222;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:12px;
">

    <!-- LEFT: TITLE -->
    <div style="
        font-size:22px;
        font-weight:800;
        display:flex;
        align-items:center;
        gap:10px;
    ">
        <span class="icon icon-setliste"></span>
        {{ setlist.name }}
    </div>

</div>

<h3 style="
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    padding:16px;
    color:#777;
    font-size:16px;
">
    Promijeni podatke
</h3>

    <!-- FORMA -->
    <form method="post">

        <!-- NAZIV -->
        <label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Naziv *
        </label>
        <input type="text" name="name"
       value="{{ setlist.name }}"
       placeholder="Naziv"
       required
       style="
                width:100%;
                height:48px;
                border-radius:12px;
                background:#111;
                border:1px solid #333;
                color:#fff;
                padding:0 14px;
                font-size:16px;
                margin-bottom:16px;
            "
        >
<!-- DATUM -->
<label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
        Datum *
</label>
    <input type="date" name="date"
           value="{{ setlist.date }}"
           required
           style="
               width:100%;
                height:48px;
                border-radius:12px;
                background:#111;
                border:1px solid #333;
                color:#fff;
                padding:0 14px;
                font-size:16px;
                margin-bottom:16px;
            "
        >
        
<!-- NAPOMENA -->
<label style="display:block;margin-bottom:6px;color:#aaa; gap: 10px;padding: 16px; font-weight:500; font-size:16px;">
            Napomena
    </label>
    <textarea name="note"
              placeholder="Bilješka"
              style="
              min-height:100px;
              border-radius:12px;
              background:#111;
              border:1px solid #333;
              color:#fff;
              padding:16px;
          ">{{ setlist.note }}</textarea>

<div style="text-align:center;">
        
<!-- GUMB -->
<button style="
    height:48px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:16px;
    background:#6b5a2c;
    border:1px solid #333;
    color:#fff;
    border-radius:12px;
    font-weight:600;
    font-size:16px;
    text-decoration:none;
">
    <span style="
        width:18px;
        height:18px;
        display:inline-block;
        background-color:currentColor;

        mask-image:url('/static/icons/save.svg');
        -webkit-mask-image:url('/static/icons/save.svg');
        mask-repeat:no-repeat;
        -webkit-mask-repeat:no-repeat;
        mask-position:center;
        -webkit-mask-position:center;
        mask-size:contain;
        -webkit-mask-size:contain;
    "></span>
    
</button>


</form>
</div>

{% endblock %}
